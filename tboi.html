<html lang="en">
<head>
    <meta charset="utf-8" />
    <base href="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/tboi/">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #ruffle-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
      window.fileMergerConfig = {
        files: [
          {name: "TheBindingofIsaac.swf", parts: 2}
        ],
        basePath: "",
        debug: true
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ac5cdfc0042aca584e72619375b4aca948a9243c/merge.js"></script>
</head>
<body>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    "autoplay": "off",
    "polyfills": true,
    "letterbox": "on",
    "backgroundColor": null,
    "scale": "showAll",
    "allowFullscreen": true,
    "forceScale": true,
    "forceAlign": true,
    "splashScreen": true,
    "wmode": "Window",
    "unmuteOverlay": "hidden",
    "quality": "high"
  };
</script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.id = "ruffle-player";
    document.body.append(player);
    fetch("TheBindingofIsaac.swf")
      .then(response => response.arrayBuffer())
      .then(swfFile => {player.load({data: swfFile, swfFileName: "TheBindingofIsaac.swf", base: "https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/tboi/"})});
  })
  
</script>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>>
</body>
</html>
