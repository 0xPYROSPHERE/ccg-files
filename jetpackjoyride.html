<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>Jetpack Joyride</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/gh/Klombos/jride@main/css/styles.css"
    />
    <style>
    @font-face {
        font-family: jetpackia;
        src: url(https://cdn.jsdelivr.net/gh/Klombos/jride/css/font/Jetpackia.ttf)
    }
    </style>
    <meta name="viewport" content="user-scalable=no" />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/gh/Klombos/jride@main/h5Sdk.js"
    ></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/jetpackjoyride/phaser-3.24.1.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/gh/Klombos/jride@main/game3.js"
    ></script>
  </head>
  <body>
    <div class="fontLoader" style="font-family: jetpackia">-</div>
    <img
      id="rotate_image"
      src="https://cdn.jsdelivr.net/gh/Klombos/jride@main/img/HB_ic_rotateScreen.png"
      alt="rotate_screen"
      class="center"
    />
    <div id="content">
      <div id="phaser-canvas"></div>
    </div>
    <style id="injectStyles">
      html,
      body {
        background-color: black !important;
      }
      #phaser-canvas {
        overflow: hidden;
      }
    </style>

  </body>
</html>
