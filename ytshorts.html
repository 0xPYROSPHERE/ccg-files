<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Shorts Infinite Player</title>
<style>
  body, html {
    margin:0;padding:0;height:100%;width:100%;overflow:hidden;
  }
  #top-controls {
    position: fixed;
    left: 50%;
    transform: translate(-50%,0);
    top: 10px;
    z-index: 10;
  }
  #frame-player {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    z-index: 1;
  }
</style>
</head>
<body>

<div id="top-controls">
  <button onclick="document.getElementById('frame-player').contentWindow.location.reload();" id="reload">Reload</button>
  <button id="change-key">Change key</button>
</div>

<iframe id="frame-player" referrerpolicy='strict-origin-when-cross-origin'></iframe>

<script>
  API_KEYS = [
    "AIzaSyCVXzksvXxK2VoGmKH-zi8ctBWQjNEjgI8",
    "AIzaSyC6W6McjLp22ajN4oP_NhxelQ6YbcROdiY",
    "AIzaSyAxNd2pe9cs67iFALBUXq5p95ISy0wJedQ",
    "AIzaSyAGVdK3kXEJMbRfBvT6TwoL893CCkbi4HU"
  ]
  function createFrame(apiKey) {
    document.getElementById("frame-player").srcdoc = `
    <head>
      <style>
        body {
          margin: 0;
          background: black;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          overflow: hidden;
        }
        #player {
          width: 360px;
          height: 640px;
        }
        #next-video {
          position: fixed;
          bottom: 20px;
          background: #ff0000;
          color: white;
          border: none;
          padding: 12px 20px;
          font-size: 16px;
          cursor: pointer;
        }
        #no-videos, #no-player {
          position: fixed;
          bottom: 50%;
          left: 50%;
          transform: translate(-50%,0);
          color: white;
          font-size: 42px;
          font-family: "Arial";
          text-align: center;
        }
        #no-videos {
          display: none;
        }
      </style>
      </head>
      <body>
      <div id="player"><div id="no-player">Hit next</div></div>
      <div id="no-videos">No videos found. <br> Try reloading or switching API keys</div>
      <button id="next-video" onclick="nextVideo()">Next</button>
      <script src="https://www.youtube.com/iframe_api"><\/script>
      <script>
      let player;
      let shorts = [];
      let played = new Set(); // keep track of videos already played
      let nextPageToken = null;
  

      // ===== CONFIG =====
      const API_KEY = "${apiKey}";
      const MAX_RESULTS = 200;
      const SEARCH_PHRASES = [
        "gangstalking",
        "liveleak",
        "accident",
        "MarilynMansionShow",
        "cars",
        "school",
        "game",
        "DharMann",
        "balls",
        "bug",
        "men",
        "#gay",
        "pride",
        "happy",
        "blue collar worker",
        "RAJU CYCLE MECHANIC",
        "TEAM TNKDR",
        "Studio N Media",
        "try not to laugh",
        "Professor Lando",
        "Kostamoinen",
        "Sonion_",
        "Doctor Myro",
        "targeted individual",
        "T C",
        "KORCLE",
        "in public",
        "Dr Huge Flake",
        "#602",
        "Sharoz Khan Gang",
        "Siri",
        "tomerson",
        "Junya",
        "life hack",
        "khudakicow",
        "Zars",
        "ringworm", 
        "in Walmart", 
        "chromebook",
        "caught on camera",
        "mem men",
        "slide eater",
        "crashout",
        "my rusty submarine",
        "openfront.io", 
        "Kirkified",
        "gif",
        "jumpscare"
      ]

      function generateQuery() {
        let activePhrases = [...SEARCH_PHRASES];
        let selectedIndex = Math.floor(Math.random() * activePhrases.length);
        let fullQuery = activePhrases[selectedIndex];
        activePhrases.splice(selectedIndex, 1);
        for (i=0;i<3;i++) {
          selectedIndex = Math.floor(Math.random() * activePhrases.length);
          fullQuery = fullQuery + " " + activePhrases[selectedIndex];
          activePhrases.splice(selectedIndex, 1);
        }
        console.log(fullQuery);
        return(fullQuery);
      }

      async function fetchShorts() {
        try {
          document.getElementById("no-videos").style.display = "none";
          const url = new URL("https:\/\/www.googleapis.com/youtube/v3/search");
          url.searchParams.set("part", "snippet");
          url.searchParams.set("type", "video");
          url.searchParams.set("q", generateQuery());
          url.searchParams.set("maxResults", MAX_RESULTS);
          url.searchParams.set("videoDuration", "short"); 
          if(nextPageToken) url.searchParams.set("pageToken", nextPageToken);
          url.searchParams.set("key", API_KEY);

          const res = await fetch(url);
          const data = await res.json();
          nextPageToken = data.nextPageToken;

          // add new video IDs, filter out ones already played
          const newShorts = data.items.map(item => item.id.videoId)
                                      .filter(id => !played.has(id));
          shorts.push(...newShorts);

          if(!player && shorts.length) loadPlayer();
        } catch(err) {
          console.error("Failed to fetch shorts:", err);
          if(shorts.length === 0) {
              document.getElementById("no-videos").style.display = "block";
          };
          if(!player) loadPlayer();
        }
      }

      function loadPlayer() {
        const nextId = getNextVideoId();
        player = new YT.Player("player", {
          videoId: nextId,
          playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0, playsinline: 1 },
          events: { onStateChange: onPlayerStateChange }
        });
      }

      function getNextVideoId() {
        // if all have been played, reset
        if(played.size >= shorts.length) played.clear();

        // pick the next video that hasn't played yet
        const remaining = shorts.filter(id => !played.has(id));
        const nextId = remaining[Math.floor(Math.random() * remaining.length)];
        played.add(nextId);
        return nextId;
      }

      async function nextVideo() {
        let nextId = getNextVideoId();
        // pre-fetch more videos if close to end
        if(shorts.length - played.size <= 2) {
          for (let i=0;i<5;i++) {
            await fetchShorts();
          }
        }
        if(!player.loadVideoById) loadPlayer();
        player.loadVideoById(nextId);
      }

      function onPlayerStateChange(event) {
        if(event.data === YT.PlayerState.ENDED) nextVideo();
      }

      async function onYouTubeIframeAPIReady() {
        await fetchShorts();
        nextVideo();
      }


      <\/script>
      </body>
    `;
  }
  var activeKey = 0;
  document.getElementById("change-key").addEventListener("click", () => {
    if (activeKey < API_KEYS.length - 1) {
      activeKey++;
    } else {
      activeKey = 0;
    }
    createFrame(API_KEYS[activeKey]);
    });

  createFrame(API_KEYS[0]);
</script>



</body>
</html>
