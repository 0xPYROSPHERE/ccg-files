<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/goat/">
    <meta http-equiv="Content-Security-Policy" content="script-src 'unsafe-inline' 'self' blob: https://cdn.jsdelivr.net/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Angry Goat Simulator 3D Mad Goat Attack</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">\
    <style>
      body {background-color: black;}
    </style>
    <script>
      window.fileMergerConfig = {
        files: [
          {name: "AngryGoat.data.unityweb", parts: 3}
        ],
        basePath: "Build/",
        debug: false
      };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ac5cdfc0042aca584e72619375b4aca948a9243c/merge.js"></script>
    <script src="TemplateData/UnityProgress.js"></script>  
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/AngryGoat.json", {onProgress: UnityProgress});
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 1280px; height: 800px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">Angry Goat Simulator 3D Mad Goat Attack</div>
      </div>
      <script>
        var clicks = 0;
        var gameContainer = document.getElementById("gameContainer")
        gameContainer.addEventListener("click", () => {
          if (clicks > 1) {
            gameContainer.requestPointerLock();
          }
          clicks++;
          setTimeout(() => {clicks--;}, 500);
        })
      </script>
    </div>
  </body>
</html>
