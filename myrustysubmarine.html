<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/ShadowDevLabs/files@main/my-rusty-submarine/">
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | MyRustySubmarine</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/MyRustySubmarineWebGL.json", { onProgress: UnityProgress });
    </script>
    <style>
      body,
      html {
          margin: 0;
          padding: 0;
          height: 100%;
          width: 100%;
          overflow: hidden;
      }

      .webgl-content, #unityContainer {
          position: absolute;
          width: 100vw;
          height: 100vh;
          border: none;
      }
    </style>
  </head>
  <body>
    <div class="webgl-content">
      <div id="unityContainer"></div>
    </div>
  </body>
</html>
